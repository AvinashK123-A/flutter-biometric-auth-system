def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) throw new GradleException("Flutter SDK not found.")
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'
apply plugin: 'com.google.firebase.crashlytics'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.avinash.biometric.auth"
    compileSdk 34
    ndkVersion flutter.ndkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions { jvmTarget = '17' }
    sourceSets { main.java.srcDirs += 'src/main/kotlin' }

    defaultConfig {
        applicationId "com.avinash.biometric.auth"
        minSdkVersion 23  // Biometric API requires API 23+
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        manifestPlaceholders = [
            appAuthRedirectScheme: "com.avinash.biometric.auth"
        ]
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias'] ?: System.getenv('KEY_ALIAS')
            keyPassword keystoreProperties['keyPassword'] ?: System.getenv('KEY_PASSWORD')
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword'] ?: System.getenv('STORE_PASSWORD')
        }
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
            applicationIdSuffix ".debug"
            minifyEnabled false
        }
    }

    flavorDimensions "environment"
    productFlavors {
        dev {
            dimension "environment"
            applicationIdSuffix ".dev"
            buildConfigField "String", "BASE_URL", '"https://dev-api.biometricauth.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"dev"'
            // Biometric timeout in milliseconds
            buildConfigField "long", "SESSION_TIMEOUT_MS", "300000L"  // 5 minutes for dev
            buildConfigField "int", "MAX_AUTH_ATTEMPTS", "10"
            resValue "string", "app_name", "BiometricAuth Dev"
        }
        qa {
            dimension "environment"
            applicationIdSuffix ".qa"
            buildConfigField "String", "BASE_URL", '"https://qa-api.biometricauth.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"qa"'
            buildConfigField "long", "SESSION_TIMEOUT_MS", "300000L"
            buildConfigField "int", "MAX_AUTH_ATTEMPTS", "5"
            resValue "string", "app_name", "BiometricAuth QA"
        }
        uat {
            dimension "environment"
            applicationIdSuffix ".uat"
            buildConfigField "String", "BASE_URL", '"https://uat-api.biometricauth.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"uat"'
            buildConfigField "long", "SESSION_TIMEOUT_MS", "180000L"  // 3 minutes for UAT
            buildConfigField "int", "MAX_AUTH_ATTEMPTS", "5"
            resValue "string", "app_name", "BiometricAuth UAT"
        }
        prod {
            dimension "environment"
            buildConfigField "String", "BASE_URL", '"https://api.biometricauth.com/v1"'
            buildConfigField "String", "ENVIRONMENT", '"production"'
            buildConfigField "long", "SESSION_TIMEOUT_MS", "120000L"  // 2 minutes for prod
            buildConfigField "int", "MAX_AUTH_ATTEMPTS", "3"
            resValue "string", "app_name", "Biometric Auth"
        }
    }
}

flutter { source '../..' }

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    platform('com.google.firebase:firebase-bom:32.6.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'androidx.multidex:multidex:2.0.1'

    // Biometric Authentication
    implementation 'androidx.biometric:biometric:1.2.0-alpha05'
    implementation 'androidx.biometric:biometric-ktx:1.2.0-alpha05'

    // Secure Storage
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'net.zetetic:android-database-sqlcipher:4.5.4'

    // Crypto
    implementation 'org.bouncycastle:bcprov-jdk15on:1.70'

    // JWT
    implementation 'com.auth0.android:jwtdecode:2.0.2'

    // Device Info
    implementation 'com.google.android.gms:play-services-safetynet:18.0.1'

    // WorkManager for session management
    implementation 'androidx.work:work-runtime-ktx:2.9.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.biometric:biometric:1.2.0-alpha05'
}
