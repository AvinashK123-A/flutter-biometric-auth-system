name: flutter_biometric_auth_system
description: Enterprise biometric authentication system with Face ID, fingerprint, PIN fallback, session management, secure token storage, MFA, jailbreak detection, and auto-logout.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management (GetX)
  get: ^4.6.6

  # Biometric Authentication
  local_auth: ^2.1.7
  flutter_secure_storage: ^9.0.0

  # Networking
  dio: ^5.3.2

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.10
  firebase_crashlytics: ^3.4.8

  # JWT & Crypto
  dart_jsonwebtoken: ^2.8.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.7.3

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # OTP / PIN Input
  pinput: ^3.0.1

  # Device Security
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1

  # UI
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  shimmer: ^3.0.0

  # Utils
  uuid: ^4.1.0
  intl: ^0.18.1
  connectivity_plus: ^5.0.2
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  permission_handler: ^11.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
